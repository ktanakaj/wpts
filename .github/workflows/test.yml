# GitHub ActionsによるCI自動テスト設定。
# masterブランチがpushまたはプルリク更新されたタイミングで自動テストを流す。
name: Test

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize]

jobs:
  dotnet-test:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      # リポジトリのチェックアウト
      - uses: actions/checkout@v6

      # msbuildをパスに登録
      - uses: microsoft/setup-msbuild@v3

      # NuGetの取得
      - run: nuget restore "./Wikipedia 翻訳支援ツール.sln"

      # ビルドの実行
      - run: msbuild "./Wikipedia 翻訳支援ツール.sln"

      # ユニットテストの実行
      - name: Run tests
        shell: pwsh
        run: |
          $vsTestPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
          if (!(Test-Path $vsTestPath)) {
            Write-Error "VSTest not found at expected location: $vsTestPath"
            exit 1
          }

          $dlls = Get-ChildItem -Recurse -Filter "*Test.dll" |
                    Where-Object { $_.FullName -match "\\bin\\(Debug|Release)\\" }
                    ForEach-Object { $_.FullName }

          & "$vsTestPath" $dlls
        timeout-minutes: 3
