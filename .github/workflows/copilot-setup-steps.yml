# Copilot Coding Agentの実行環境の設定。
# 開発に必要なツールのインストールや、依存関係の解決を行う。
name: "Copilot Setup Steps"

on:
  workflow_dispatch:

  # pushやPRでこのファイルが更新された際に動作確認用に実行するよう設定
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      # リポジトリのチェックアウト
      - uses: actions/checkout@v6

      # msbuildをパスに登録
      - uses: microsoft/setup-msbuild@v3

      # NuGetの取得
      - run: nuget restore "./Wikipedia 翻訳支援ツール.sln"
